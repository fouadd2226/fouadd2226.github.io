name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Finalize
        env:
          A7A00A: ${{ secrets.A7A00A }}
          B91533: ${{ secrets.B91533 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A7A00A', '')
          bm = os.environ.get('B91533', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s.replace('<!-- 7c081bee7b37bee8c9dede8be6a45dd7a8703eae -->', gm)
              s2 = s2.replace('<!-- 9f52eaba944c3b0c45b81dc73d029f0fc910c5b7bb -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0:
              sys.exit(1)
          "
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
